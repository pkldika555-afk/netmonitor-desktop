<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 300px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
    }
    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 20px;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    h1 {
      color: #f1f5f9;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .status {
      color: #64748b;
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    .bar-wrap {
      width: 200px; height: 3px;
      background: #1e293b;
      border-radius: 99px; overflow: hidden;
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      border-radius: 99px;
      animation: load 2.5s ease-in-out infinite;
    }
    @keyframes load {
      0%   { width: 0%;  margin-left: 0; }
      50%  { width: 70%; margin-left: 15%; }
      100% { width: 0%;  margin-left: 100%; }
    }
    .version {
      position: absolute;
      bottom: 16px;
      color: #334155;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="card">

    <svg width="64" height="64" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="256" height="256" rx="60" fill="#030712"/>
      <path d="M60 128H90L105 80L130 176L155 110L170 128H200"
            stroke="#22C55E" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M128 50C90 50 70 70 70 70V140C70 180 128 210 128 210C128 210 186 180 186 140V70C186 70 166 50 128 50Z"
            stroke="#22C55E" stroke-width="6" stroke-opacity="0.3" fill="none"/>
    </svg>

    <h1>NetMonitor</h1>
    <div class="status" id="status">Memulai server...</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <span class="version">v1.0.0</span>
  </div>

  <script>
    const messages = [
      'Memulai database...',
      'Menghubungkan server...',
      'Memuat aplikasi...',
      'Sebentar lagi...',
    ];
    let i = 0;
    setInterval(() => {
      document.getElementById('status').textContent = messages[i % messages.length];
      i++;
    }, 1200);
  </script>
</body>
</html>
